services:
  - type: web
    name: sathya-portfolio
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn portfolio_site.wsgi --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "future-fs-01-zdsi.onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
