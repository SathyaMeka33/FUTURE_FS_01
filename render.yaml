services:
  - type: web
    name: sathya-portfolio
    runtime: python
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py ensure_admin
    startCommand: echo "[BOOT] starting web process"; echo "[BOOT] PORT=${PORT:-10000}"; echo "[BOOT] ADMIN_USERNAME=${ADMIN_USERNAME:-<unset>} DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-<unset>}"; python manage.py ensure_admin || true; exec gunicorn portfolio_site.wsgi:application --bind 0.0.0.0:${PORT:-10000} --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "future-fs-01-zdsi.onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
