services:
  - type: web
    name: sathya-portfolio
    runtime: python
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: python -m gunicorn portfolio_site.wsgi:application --bind 0.0.0.0:$PORT --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "future-fs-01-zdsi.onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
